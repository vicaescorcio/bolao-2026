<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Copa do Mundo 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Bolão Copa do Mundo 2026</h1>
            <p>Preencha seus palpites para todos os jogos e envie por e-mail</p>
        </header>

        <form id="bolaoForm">
            <!-- Dados do participante -->
            <div class="form-section">
                <h2>📋 Seus Dados</h2>
                <div class="form-group">
                    <label for="nome">Nome completo *</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="form-group">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="telefone">Telefone (opcional)</label>
                    <input type="tel" id="telefone" name="telefone">
                </div>
            </div>

            <!-- Fase de Grupos -->
            <div class="form-section">
                <h2>⚽ Fase de Grupos</h2>
                <div id="grupos-container"></div>
            </div>

            <!-- Oitavas de Final -->
            <div class="form-section">
                <h2>🏹 Oitavas de Final</h2>
                <div id="oitavas-container"></div>
            </div>

            <!-- Quartas de Final -->
            <div class="form-section">
                <h2>⚡ Quartas de Final</h2>
                <div id="quartas-container"></div>
            </div>

            <!-- Semifinais -->
            <div class="form-section">
                <h2>🔥 Semifinais</h2>
                <div id="semis-container"></div>
            </div>

            <!-- Final -->
            <div class="form-section">
                <h2>🏆 Final</h2>
                <div id="final-container"></div>
            </div>

            <!-- Botões -->
            <div class="form-actions">
                <button type="button" id="limparBtn" class="btn btn-secondary">Limpar Tudo</button>
                <button type="submit" class="btn btn-primary">Enviar Palpites por E-mail</button>
            </div>
        </form>

        <div id="mensagem" class="mensagem"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
